# RBAC для repo-sync: CMP sidecar в argocd-repo-server читает ArgoCD
# repository-Secret'ы (type: helm), чтобы материализовать helm repositories.yaml
# для резолва приватных зависимостей.
#
# Применять в namespace, где крутится argocd-repo-server (обычно argocd).
# ServiceAccount нужно подключить к repo-server через ArgoCD helm-values:
#
#   repoServer:
#     serviceAccount:
#       name: argocd-repo-server
#
# Минимум прав: get/list Secret'ов в этом namespace. Без watch/create/update.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-cmp-repo-sync
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmp-repo-sync
    app.kubernetes.io/part-of: argocd
rules:
  # repo-sync читает Secret'ы с label argocd.argoproj.io/secret-type=repository.
  # Фильтр по label делается в коде (в запросе к API), здесь даём доступ ко
  # всем Secret'ам в namespace — чтобы ограничить по label через resourceNames,
  # пришлось бы перечислять имена, что не масштабируется. При необходимости
  # ужесточения можно вынести repo-sync в отдельный namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-cmp-repo-sync
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmp-repo-sync
    app.kubernetes.io/part-of: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-repo-server
    namespace: argocd
roleRef:
  kind: Role
  name: argocd-cmp-repo-sync
  apiGroup: rbac.authorization.k8s.io
