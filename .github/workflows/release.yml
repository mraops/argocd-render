name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p build
          go build -ldflags "-s -w -X main.appVersion=${VERSION}" \
            -o "build/argocd-render-${{ matrix.os }}-${{ matrix.arch }}" .

      - name: Compress
        run: |
          cd build
          tar -czf "argocd-render-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "argocd-render-${{ matrix.os }}-${{ matrix.arch }}"
          shasum -a 256 "argocd-render-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > "argocd-render-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: argocd-render-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build/argocd-render-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            build/argocd-render-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
