name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.binary }} ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # argocd-render: CLI tool, distributed for linux + macOS
          - binary: argocd-render
            os: linux
            arch: amd64
            src: .
          - binary: argocd-render
            os: linux
            arch: arm64
            src: .
          - binary: argocd-render
            os: darwin
            arch: arm64
            src: .
          # helm-repo-sync: runs inside the CMP sidecar (linux); also ship
          # darwin/arm64 for local testing on Apple Silicon.
          - binary: helm-repo-sync
            os: linux
            arch: amd64
            src: tools/cmp-sops/helm-repo-sync
          - binary: helm-repo-sync
            os: linux
            arch: arm64
            src: tools/cmp-sops/helm-repo-sync
          - binary: helm-repo-sync
            os: darwin
            arch: arm64
            src: tools/cmp-sops/helm-repo-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          # helm-repo-sync is a separate go module; disable the default
          # go.sum cache key so setup-go doesn't fail when the module under
          # tools/ has no lockfile matching the root.
          cache: false

      - name: Build
        working-directory: ${{ matrix.src }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p build
          go build -ldflags "-s -w -X main.appVersion=${VERSION}" \
            -o "build/${{ matrix.binary }}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}" .

      - name: Compress
        working-directory: ${{ matrix.src }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ASSET="${{ matrix.binary }}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          tar -czf "build/${ASSET}.tar.gz" -C build "${ASSET}"
          shasum -a 256 "build/${ASSET}.tar.gz" > "build/${ASSET}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ matrix.src }}/build/${{ matrix.binary }}-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            ${{ matrix.src }}/build/${{ matrix.binary }}-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
