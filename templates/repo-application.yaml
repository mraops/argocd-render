apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${name}
  namespace: ${metadata_namespace}
  annotations:
    argocd.argoproj.io/sync-wave: "${sync_wave}"
  labels:
    managed-by: argocd-render
    environment: ${stage}
    component: ${repo_name}

spec:
  project: ${project}
  source:
    repoURL: ${repo_url}
    targetRevision: ${branch}
    path: ${path}
    directory:
      recurse: true
  destination:
    server: ${server}
    namespace: ${namespace}
