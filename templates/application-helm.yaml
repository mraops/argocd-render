apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${name}
  annotations:
    argocd.argoproj.io/sync-wave: "${sync_wave}"
  labels:
    managed-by: argocd-render
    environment: ${stage}
    component: ${app_name}

spec:
  project: ${project}
  source:
    repoURL: ${repo_url}
    targetRevision: ${branch}
    path: ${chart_path}
    helm:
      releaseName: ${release_name}
      valueFiles:
        - ${values_path}
  destination:
    server: ${server}
    namespace: ${namespace}
